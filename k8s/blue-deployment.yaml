apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-blue-deployment
  labels:
    app: sentiment-api
    slot: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentiment-api
      slot: blue
  template:
    metadata:
      labels:
        app: sentiment-api
        slot: blue
    spec:
      containers:
        - name: sentiment-api
          image: abdullahsdocker/sentiment-api:unstable
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: log-storage
              mountPath: /app/logs
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 15
      volumes:
        - name: log-storage
          persistentVolumeClaim:
            claimName: sentiment-logs-pvc
