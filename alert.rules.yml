groups:
  - name: sentiment_drift_alerts
    rules:
      - alert: ModelConfidenceDrift
        expr: prediction_confidence_score < 0.67
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Model confidence has dropped below threshold"
          description: >
            prediction_confidence_score has been below 0.67 for more than 1 minute.
            Automatic rollback to stable fallback will be triggered.
